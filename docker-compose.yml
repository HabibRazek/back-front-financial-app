services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financial-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
    networks:
      - financial-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financial-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://financial-backend-service:3001/api
    depends_on:
      - backend
    networks:
      - financial-net

networks:
  financial-net:
    driver: bridge