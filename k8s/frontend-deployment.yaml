apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-frontend
  namespace: financial-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: financial-frontend
  template:
    metadata:
      labels:
        app: financial-frontend
    spec:
      containers:
        - name: frontend
          image: financial-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: "http://financial-backend-service:3001/api"
---
apiVersion: v1
kind: Service
metadata:
  name: financial-frontend-service
  namespace: financial-app
spec:
  selector:
    app: financial-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort
