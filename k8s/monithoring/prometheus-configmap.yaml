apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: financial-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alert_rules.yml
    scrape_configs:
      - job_name: financial-backend
        metrics_path: /api/metrics
        static_configs:
          - targets: ["financial-backend-service:3001"]
