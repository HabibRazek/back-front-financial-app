apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-financial
  namespace: financial-app
data:
  financial-dashboard.json: |
    {
      "title": "FinanceOS - Backend Monitoring",
      "uid": "financial-backend",
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["nestjs", "kubernetes", "prometheus"],
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Backend Status",
          "type": "stat",
          "targets": [{ "expr": "up{job=\"financial-backend\"}", "instant": true, "refId": "A" }],
          "fieldConfig": {
            "defaults": {
              "mappings": [{ "options": { "0": { "color": "red", "text": "DOWN" }, "1": { "color": "green", "text": "UP" } }, "type": "value" }],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "title": "Total HTTP Requests",
          "type": "stat",
          "targets": [{ "expr": "sum(http_requests_total) or vector(0)", "instant": true, "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } } },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 }
        },
        {
          "id": 3,
          "title": "Request Rate (req/sec)",
          "type": "stat",
          "targets": [{ "expr": "sum(rate(http_requests_total[1m])) or vector(0)", "instant": true, "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "reqps", "decimals": 2, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 10 }, { "color": "red", "value": 50 }] }, "color": { "mode": "thresholds" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 }
        },
        {
          "id": 4,
          "title": "Memory Usage",
          "type": "stat",
          "targets": [{ "expr": "process_resident_memory_bytes", "instant": true, "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "bytes", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 200000000 }, { "color": "red", "value": 400000000 }] }, "color": { "mode": "thresholds" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 }
        },
        {
          "id": 5,
          "title": "CPU Usage",
          "type": "stat",
          "targets": [{ "expr": "rate(process_cpu_seconds_total[1m]) * 100", "instant": true, "refId": "A" }],
          "fieldConfig": { "defaults": { "unit": "percent", "decimals": 2, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 50 }, { "color": "red", "value": 80 }] }, "color": { "mode": "thresholds" } } },
          "options": { "colorMode": "background", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 }
        },
        {
          "id": 6,
          "title": "HTTP Request Rate Over Time",
          "type": "timeseries",
          "targets": [{ "expr": "sum(rate(http_requests_total[1m])) or vector(0)", "legendFormat": "req/sec", "refId": "A" }],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "blue" }, "custom": { "lineWidth": 2, "fillOpacity": 10, "showPoints": "never" }, "unit": "reqps" } },
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 }
        },
        {
          "id": 7,
          "title": "Memory Usage Over Time",
          "type": "timeseries",
          "targets": [{ "expr": "process_resident_memory_bytes", "legendFormat": "Memory", "refId": "A" }],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" }, "custom": { "lineWidth": 2, "fillOpacity": 10, "showPoints": "never" }, "unit": "bytes" } },
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 }
        },
        {
          "id": 8,
          "title": "API Response Time (p95)",
          "type": "timeseries",
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) or vector(0)", "legendFormat": "p95 latency", "refId": "A" }],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "orange" }, "custom": { "lineWidth": 2, "fillOpacity": 8, "showPoints": "never" }, "unit": "s" } },
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 }
        },
        {
          "id": 9,
          "title": "Active Node.js Handles",
          "type": "timeseries",
          "targets": [{ "expr": "nodejs_active_handles_total", "legendFormat": "Active Handles", "refId": "A" }],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "purple" }, "custom": { "lineWidth": 2, "fillOpacity": 8, "showPoints": "never" }, "unit": "short" } },
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true } },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 }
        }
      ]
    }
