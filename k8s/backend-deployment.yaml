apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-backend
  namespace: financial-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: financial-backend
  template:
    metadata:
      labels:
        app: financial-backend
    spec:
      containers:
        - name: backend
          image: financial-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: financial-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: financial-secrets
                  key: jwt-secret
---
apiVersion: v1
kind: Service
metadata:
  name: financial-backend-service
  namespace: financial-app
spec:
  selector:
    app: financial-backend
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
